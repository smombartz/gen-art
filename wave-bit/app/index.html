<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAVE-BIT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #F5F0EB; --fg: #1A1A1A; --accent: #FF5500; --white: #FFFFFF;
    --font: 'Space Mono', monospace;
    --text-xs: 8px; --text-sm: 9px; --text-base: 10px; --tracking: 0.15em;
    --toolbar-w: 280px;
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg); color: var(--fg); font-family: var(--font);
    font-size: var(--text-base); letter-spacing: var(--tracking);
    text-transform: uppercase; line-height: 1.4;
    -webkit-font-smoothing: antialiased; display: flex;
  }
  .canvas {
    flex: 1; overflow-y: auto; padding: 24px;
    scrollbar-width: thin; scrollbar-color: var(--fg) transparent;
  }
  .canvas::-webkit-scrollbar { width: 4px; }
  .canvas::-webkit-scrollbar-thumb { background: var(--fg); }
  .toolbar {
    width: var(--toolbar-w); flex-shrink: 0; border-left: 1px solid var(--fg);
    overflow-y: auto; display: flex; flex-direction: column;
    scrollbar-width: thin; scrollbar-color: var(--fg) transparent;
  }
  .toolbar::-webkit-scrollbar { width: 4px; }
  .toolbar::-webkit-scrollbar-thumb { background: var(--fg); }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 12px;
  }
  .grid-item {
    aspect-ratio: 1; cursor: pointer; border: 1px solid transparent;
    background: var(--white); line-height: 0; position: relative;
  }
  .grid-item:hover { border-color: var(--fg); }
  .grid-item.selected { border: 2px solid var(--accent); }
  .grid-item svg { width: 100%; height: 100%; display: block; }
  .grid-item .seed-tag {
    position: absolute; bottom: 2px; right: 3px;
    font-size: 7px; opacity: 0.3; letter-spacing: 0.05em;
  }
  .tb-header {
    padding: 16px 16px 12px; border-bottom: 1px solid var(--fg);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .tb-header .logo { font-size: 11px; letter-spacing: 0.25em; }
  .tb-header .ver { font-size: var(--text-xs); opacity: 0.4; }
  .tb-section { padding: 12px 16px; border-bottom: 1px solid var(--fg); }
  .tb-label { font-size: var(--text-xs); opacity: 0.4; margin-bottom: 8px; }
  .tb-preview {
    padding: 16px; border-bottom: 1px solid var(--fg);
    display: flex; justify-content: center; background: var(--white);
  }
  .tb-preview svg { width: 120px; height: 120px; display: block; }
  .tb-preview.empty {
    background: var(--bg); height: 152px; align-items: center;
    font-size: var(--text-xs); opacity: 0.3;
  }
  button {
    font-family: var(--font); font-size: var(--text-xs); letter-spacing: var(--tracking);
    text-transform: uppercase; background: transparent; color: var(--fg);
    border: 1px solid var(--fg); padding: 5px 10px; cursor: pointer;
    transition: background 0s, color 0s; line-height: 1.2;
  }
  button:hover { background: var(--fg); color: var(--bg); }
  button:active { background: var(--accent); border-color: var(--accent); color: var(--white); }
  button.active { background: var(--fg); color: var(--bg); }
  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .seed-row { display: flex; gap: 6px; align-items: center; }
  .seed-row input {
    flex: 1; font-family: var(--font); font-size: var(--text-base);
    letter-spacing: var(--tracking); text-transform: uppercase;
    background: transparent; border: none; border-bottom: 1px solid var(--fg);
    padding: 4px 0; color: var(--fg); outline: none; min-width: 0;
  }
  .seed-row input:focus { border-bottom-color: var(--accent); }
  .quad-grid { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--fg); }
  .q-cell { padding: 8px; display: flex; flex-direction: column; gap: 4px; }
  .q-cell:nth-child(1) { border-right: 1px solid var(--fg); border-bottom: 1px solid var(--fg); }
  .q-cell:nth-child(2) { border-bottom: 1px solid var(--fg); }
  .q-cell:nth-child(3) { border-right: 1px solid var(--fg); }
  .q-cell .q-id { font-size: 7px; opacity: 0.4; }
  .q-cell.disabled { opacity: 0.25; pointer-events: none; }
  select {
    font-family: var(--font); font-size: var(--text-xs); letter-spacing: 0.06em;
    text-transform: uppercase; background: transparent; color: var(--fg);
    border: none; border-bottom: 1px solid var(--fg); padding: 2px 0;
    cursor: pointer; outline: none; appearance: none; -webkit-appearance: none; width: 100%;
  }
  select:focus { border-bottom-color: var(--accent); }
  .param-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .param-row:first-child { margin-top: 0; }
  .param-label { font-size: var(--text-xs); width: 44px; flex-shrink: 0; }
  input[type="range"] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 1px; background: var(--fg); outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 10px; height: 10px;
    border-radius: 50%; background: var(--fg); border: none;
  }
  input[type="range"]::-webkit-slider-thumb:hover { background: var(--accent); }
  input[type="range"]::-moz-range-thumb {
    width: 10px; height: 10px; border-radius: 50%; background: var(--fg); border: none;
  }
  .param-val { font-size: var(--text-xs); width: 20px; text-align: right; opacity: 0.5; }
  .toggle-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .toggle {
    width: 28px; height: 14px; border: 1px solid var(--fg);
    position: relative; cursor: pointer; background: transparent; padding: 0;
  }
  .toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px; width: 8px; height: 8px; background: var(--fg);
  }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle.on::after { left: auto; right: 2px; background: var(--white); }
  .count {
    font-size: var(--text-xs); opacity: 0.35; padding: 8px 16px;
    border-bottom: 1px solid var(--fg);
  }
</style>
</head>
<body>
<div class="canvas"><div class="grid" id="grid"></div></div>
<div class="toolbar">
  <div class="tb-header">
    <span class="logo">Wave&mdash;Bit</span>
    <span class="ver">V1.0</span>
  </div>
  <div class="tb-preview empty" id="preview">Select an icon</div>
  <div class="count" id="count">0 icons</div>

  <div class="tb-section">
    <div class="tb-label">Theme</div>
    <div class="btn-row" id="theme-row"></div>
  </div>

  <div class="tb-section">
    <div class="tb-label">Generate</div>
    <div class="seed-row">
      <input type="text" id="seed-input" value="42" placeholder="Seed">
      <button id="btn-generate">Go</button>
      <button id="btn-random">Rnd</button>
    </div>
  </div>
  <div class="tb-section">
    <div class="tb-label">Symmetry</div>
    <div class="btn-row">
      <button class="sym-btn active" data-sym="none">None</button>
      <button class="sym-btn" data-sym="mirror">Mirror</button>
      <button class="sym-btn" data-sym="rotate">Rotate</button>
      <button class="sym-btn" data-sym="diagonal">Diag</button>
    </div>
  </div>
  <div class="tb-section">
    <div class="tb-label">Parameters</div>
    <div class="param-row">
      <span class="param-label">Gap</span>
      <input type="range" id="gap-slider" min="0" max="16" step="1" value="0">
      <span class="param-val" id="gap-val">0</span>
    </div>
    <div class="param-row">
      <span class="param-label">Stroke</span>
      <input type="range" id="stroke-slider" min="0.5" max="5" step="0.5" value="2">
      <span class="param-val" id="stroke-val">2</span>
    </div>
    <div class="toggle-row">
      <span class="param-label" style="font-size:var(--text-xs)">Invert</span>
      <button class="toggle" id="invert-toggle"></button>
    </div>
  </div>
  <div class="tb-section" id="edit-section" style="display:none">
    <div class="tb-label">Edit Selected</div>
    <div class="quad-grid">
      <div class="q-cell" data-q="tl"><span class="q-id">TL</span><select class="sel-bg" data-q="tl"></select><select class="sel-ov" data-q="tl"></select></div>
      <div class="q-cell" data-q="tr"><span class="q-id">TR</span><select class="sel-bg" data-q="tr"></select><select class="sel-ov" data-q="tr"></select></div>
      <div class="q-cell" data-q="bl"><span class="q-id">BL</span><select class="sel-bg" data-q="bl"></select><select class="sel-ov" data-q="bl"></select></div>
      <div class="q-cell" data-q="br"><span class="q-id">BR</span><select class="sel-bg" data-q="br"></select><select class="sel-ov" data-q="br"></select></div>
    </div>
  </div>
  <div class="tb-section">
    <div class="tb-label">Export Selected</div>
    <div class="btn-row">
      <button id="btn-svg">Svg &darr;</button>
      <button id="btn-png">Png &darr;</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// RNG
// ═══════════════════════════════════════════
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6d2b79f5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function hashStr(s) {
  let h = 0; for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0; return h;
}

// ═══════════════════════════════════════════
// THEMES
// ═══════════════════════════════════════════
const THEMES = {};

// ── Theme 1: Geometric ──
THEMES.geometric = {
  name: 'Geometric',
  bgList: [
    ['full','Full'],['circle','Circle'],
    ['half-n','Half N'],['half-s','Half S'],['half-e','Half E'],['half-w','Half W'],
    ['qtr-tl','Qtr TL'],['qtr-tr','Qtr TR'],['qtr-bl','Qtr BL'],['qtr-br','Qtr BR'],
    ['leaf-h','Leaf H'],['leaf-v','Leaf V'],['leaf-d1','Leaf D1'],['leaf-d2','Leaf D2'],
    ['tri-tl','Tri TL'],['tri-tr','Tri TR'],['tri-bl','Tri BL'],['tri-br','Tri BR'],
  ],
  ovList: [
    ['none','None'],['dot','Dot'],['ring','Ring'],['dot-ring','Dot+Ring'],
    ['concentric','Concentric'],['bullseye','Bullseye'],['cross','Cross +'],
    ['diag-1','Diag \\'],['diag-2','Diag /'],['diag-x','Diag X'],
    ['arc-n','Arc N'],['arc-s','Arc S'],['arc-e','Arc E'],['arc-w','Arc W'],
    ['lines-h','Lines H'],['lines-d','Lines D'],['orbit','Orbit'],['lollipop','Lollipop'],
  ],
  bgR: {
    'full':   (S,f)=>`<rect width="${S}" height="${S}" fill="${f}"/>`,
    'circle': (S,f)=>`<circle cx="${S/2}" cy="${S/2}" r="${S/2}" fill="${f}"/>`,
    'half-n': (S,f)=>`<circle cx="${S/2}" cy="0" r="${S/2}" fill="${f}"/>`,
    'half-s': (S,f)=>`<circle cx="${S/2}" cy="${S}" r="${S/2}" fill="${f}"/>`,
    'half-e': (S,f)=>`<circle cx="${S}" cy="${S/2}" r="${S/2}" fill="${f}"/>`,
    'half-w': (S,f)=>`<circle cx="0" cy="${S/2}" r="${S/2}" fill="${f}"/>`,
    'qtr-tl': (S,f)=>`<circle cx="0" cy="0" r="${S}" fill="${f}"/>`,
    'qtr-tr': (S,f)=>`<circle cx="${S}" cy="0" r="${S}" fill="${f}"/>`,
    'qtr-bl': (S,f)=>`<circle cx="0" cy="${S}" r="${S}" fill="${f}"/>`,
    'qtr-br': (S,f)=>`<circle cx="${S}" cy="${S}" r="${S}" fill="${f}"/>`,
    'leaf-h': (S,f)=>{const r=S*.58;return`<path d="M0 ${S/2}A${r} ${r} 0 0 1 ${S} ${S/2}A${r} ${r} 0 0 1 0 ${S/2}Z" fill="${f}"/>`;},
    'leaf-v': (S,f)=>{const r=S*.58;return`<path d="M${S/2} 0A${r} ${r} 0 0 1 ${S/2} ${S}A${r} ${r} 0 0 1 ${S/2} 0Z" fill="${f}"/>`;},
    'leaf-d1':(S,f)=>{const r=S*.58;return`<g transform="rotate(45,${S/2},${S/2})"><path d="M0 ${S/2}A${r} ${r} 0 0 1 ${S} ${S/2}A${r} ${r} 0 0 1 0 ${S/2}Z" fill="${f}"/></g>`;},
    'leaf-d2':(S,f)=>{const r=S*.58;return`<g transform="rotate(-45,${S/2},${S/2})"><path d="M0 ${S/2}A${r} ${r} 0 0 1 ${S} ${S/2}A${r} ${r} 0 0 1 0 ${S/2}Z" fill="${f}"/></g>`;},
    'tri-tl': (S,f)=>`<polygon points="0,0 ${S},0 0,${S}" fill="${f}"/>`,
    'tri-tr': (S,f)=>`<polygon points="0,0 ${S},0 ${S},${S}" fill="${f}"/>`,
    'tri-bl': (S,f)=>`<polygon points="0,0 0,${S} ${S},${S}" fill="${f}"/>`,
    'tri-br': (S,f)=>`<polygon points="${S},0 0,${S} ${S},${S}" fill="${f}"/>`,
  },
  ovR: {
    'none':      ()=>'',
    'dot':       (S,sw,c)=>`<circle cx="${S/2}" cy="${S/2}" r="${S*.07}" fill="${c}"/>`,
    'ring':      (S,sw,c)=>`<circle cx="${S/2}" cy="${S/2}" r="${S*.15}" fill="none" stroke="${c}" stroke-width="${sw}"/>`,
    'dot-ring':  (S,sw,c)=>`<circle cx="${S/2}" cy="${S/2}" r="${S*.055}" fill="${c}"/><circle cx="${S/2}" cy="${S/2}" r="${S*.18}" fill="none" stroke="${c}" stroke-width="${sw}"/>`,
    'concentric':(S,sw,c)=>[.1,.2,.32].map(r=>`<circle cx="${S/2}" cy="${S/2}" r="${S*r}" fill="none" stroke="${c}" stroke-width="${sw}"/>`).join(''),
    'bullseye':  (S,sw,c)=>`<circle cx="${S/2}" cy="${S/2}" r="${S*.05}" fill="${c}"/>`+[.16,.3].map(r=>`<circle cx="${S/2}" cy="${S/2}" r="${S*r}" fill="none" stroke="${c}" stroke-width="${sw}"/>`).join(''),
    'cross':     (S,sw,c)=>`<line x1="${S*.12}" y1="${S/2}" x2="${S*.88}" y2="${S/2}" stroke="${c}" stroke-width="${sw}"/><line x1="${S/2}" y1="${S*.12}" x2="${S/2}" y2="${S*.88}" stroke="${c}" stroke-width="${sw}"/>`,
    'diag-1':    (S,sw,c)=>`<line x1="${S*.12}" y1="${S*.12}" x2="${S*.88}" y2="${S*.88}" stroke="${c}" stroke-width="${sw}"/>`,
    'diag-2':    (S,sw,c)=>`<line x1="${S*.88}" y1="${S*.12}" x2="${S*.12}" y2="${S*.88}" stroke="${c}" stroke-width="${sw}"/>`,
    'diag-x':    (S,sw,c)=>`<line x1="${S*.12}" y1="${S*.12}" x2="${S*.88}" y2="${S*.88}" stroke="${c}" stroke-width="${sw}"/><line x1="${S*.88}" y1="${S*.12}" x2="${S*.12}" y2="${S*.88}" stroke="${c}" stroke-width="${sw}"/>`,
    'arc-n':     (S,sw,c)=>`<path d="M${S*.12} ${S*.55}A${S*.38} ${S*.38} 0 0 1 ${S*.88} ${S*.55}" fill="none" stroke="${c}" stroke-width="${sw}"/>`,
    'arc-s':     (S,sw,c)=>`<path d="M${S*.12} ${S*.45}A${S*.38} ${S*.38} 0 0 0 ${S*.88} ${S*.45}" fill="none" stroke="${c}" stroke-width="${sw}"/>`,
    'arc-e':     (S,sw,c)=>`<path d="M${S*.45} ${S*.12}A${S*.38} ${S*.38} 0 0 1 ${S*.45} ${S*.88}" fill="none" stroke="${c}" stroke-width="${sw}"/>`,
    'arc-w':     (S,sw,c)=>`<path d="M${S*.55} ${S*.12}A${S*.38} ${S*.38} 0 0 0 ${S*.55} ${S*.88}" fill="none" stroke="${c}" stroke-width="${sw}"/>`,
    'lines-h':   (S,sw,c)=>[.3,.5,.7].map(y=>`<line x1="${S*.12}" y1="${S*y}" x2="${S*.88}" y2="${S*y}" stroke="${c}" stroke-width="${sw}"/>`).join(''),
    'lines-d':   (S,sw,c)=>[-1,0,1].map(i=>{const o=S*.14*i;return`<line x1="${S*.12+o}" y1="${S*.12}" x2="${S*.88+o}" y2="${S*.88}" stroke="${c}" stroke-width="${sw}"/>`;}).join(''),
    'orbit':     (S,sw,c)=>`<ellipse cx="${S/2}" cy="${S/2}" rx="${S*.35}" ry="${S*.14}" transform="rotate(30,${S/2},${S/2})" fill="none" stroke="${c}" stroke-width="${sw}"/>`,
    'lollipop':  (S,sw,c)=>`<circle cx="${S*.32}" cy="${S*.32}" r="${S*.06}" fill="${c}"/><line x1="${S*.36}" y1="${S*.36}" x2="${S*.85}" y2="${S*.85}" stroke="${c}" stroke-width="${sw}"/>`,
  },
};

// ── Theme 2: Signal — angular, directional, runic ──
THEMES.signal = {
  name: 'Signal',
  bgList: [
    ['full','Full'],['diamond','Diamond'],['hex','Hex'],
    ['chevron-n','Chev N'],['chevron-s','Chev S'],['chevron-e','Chev E'],['chevron-w','Chev W'],
    ['stripe-h','Stripe H'],['stripe-v','Stripe V'],
    ['step-tl','Step TL'],['step-tr','Step TR'],['step-bl','Step BL'],['step-br','Step BR'],
    ['arrow-n','Arrow N'],['arrow-s','Arrow S'],['arrow-e','Arrow E'],['arrow-w','Arrow W'],
    ['cross-fat','Cross Fat'],
  ],
  ovList: [
    ['none','None'],['pip','Pip'],['hash','Hash'],['zigzag','Zigzag'],
    ['rays','Rays'],['grid','Grid'],['wave','Wave'],['asterisk','Asterisk'],
    ['tick','Tick'],['arrow-up','Arrow Up'],['arrow-rt','Arrow Rt'],
    ['notch-h','Notch H'],['notch-v','Notch V'],['tri-sm','Tri Sm'],
    ['brackets','Brackets'],['pulse','Pulse'],['starburst','Starburst'],
    ['crosshair','Crosshair'],
  ],
  bgR: {
    'full':      (S,f)=>`<rect width="${S}" height="${S}" fill="${f}"/>`,
    'diamond':   (S,f)=>`<polygon points="${S/2},${S*.04} ${S*.96},${S/2} ${S/2},${S*.96} ${S*.04},${S/2}" fill="${f}"/>`,
    'hex':       (S,f)=>{const cx=S/2,cy=S/2,r=S*.48;const p=Array.from({length:6},(_,i)=>{const a=Math.PI/3*i-Math.PI/2;return`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;}).join(' ');return`<polygon points="${p}" fill="${f}"/>`;},
    'chevron-n': (S,f)=>`<polygon points="0,${S*.65} ${S/2},${S*.1} ${S},${S*.65} ${S},${S} ${S/2},${S*.45} 0,${S}" fill="${f}"/>`,
    'chevron-s': (S,f)=>`<polygon points="0,0 ${S/2},${S*.55} ${S},0 ${S},${S*.35} ${S/2},${S*.9} 0,${S*.35}" fill="${f}"/>`,
    'chevron-e': (S,f)=>`<polygon points="0,0 ${S*.55},${S/2} 0,${S} ${S*.35},${S} ${S*.9},${S/2} ${S*.35},0" fill="${f}"/>`,
    'chevron-w': (S,f)=>`<polygon points="${S},0 ${S*.45},${S/2} ${S},${S} ${S*.65},${S} ${S*.1},${S/2} ${S*.65},0" fill="${f}"/>`,
    'stripe-h':  (S,f)=>`<rect width="${S/2}" height="${S}" fill="${f}"/>`,
    'stripe-v':  (S,f)=>`<rect width="${S}" height="${S/2}" fill="${f}"/>`,
    'step-tl':   (S,f)=>`<path d="M0 0H${S}V${S/2}H${S/2}V${S}H0Z" fill="${f}"/>`,
    'step-tr':   (S,f)=>`<path d="M0 0H${S}V${S}H${S/2}V${S/2}H0Z" fill="${f}"/>`,
    'step-bl':   (S,f)=>`<path d="M0 0H${S/2}V${S/2}H${S}V${S}H0Z" fill="${f}"/>`,
    'step-br':   (S,f)=>`<path d="M${S/2} 0H${S}V${S}H0V${S/2}H${S/2}Z" fill="${f}"/>`,
    'arrow-n':   (S,f)=>`<polygon points="${S/2},${S*.05} ${S*.88},${S*.42} ${S*.88},${S*.95} ${S*.12},${S*.95} ${S*.12},${S*.42}" fill="${f}"/>`,
    'arrow-s':   (S,f)=>`<polygon points="${S*.12},${S*.05} ${S*.88},${S*.05} ${S*.88},${S*.58} ${S/2},${S*.95} ${S*.12},${S*.58}" fill="${f}"/>`,
    'arrow-e':   (S,f)=>`<polygon points="${S*.05},${S*.12} ${S*.58},${S*.12} ${S*.95},${S/2} ${S*.58},${S*.88} ${S*.05},${S*.88}" fill="${f}"/>`,
    'arrow-w':   (S,f)=>`<polygon points="${S*.95},${S*.12} ${S*.95},${S*.88} ${S*.42},${S*.88} ${S*.05},${S/2} ${S*.42},${S*.12}" fill="${f}"/>`,
    'cross-fat': (S,f)=>{const a=S*.28,b=S*.72;return`<path d="M${a} 0H${b}V${a}H${S}V${b}H${b}V${S}H${a}V${b}H0V${a}H${a}Z" fill="${f}"/>`;},
  },
  ovR: {
    'none':      ()=>'',
    'pip':       (S,sw,c)=>{const cx=S/2,cy=S/2,r=S*.08;return`<polygon points="${cx},${cy-r} ${cx+r},${cy} ${cx},${cy+r} ${cx-r},${cy}" fill="${c}"/>`;},
    'hash':      (S,sw,c)=>
      `<line x1="${S*.36}" y1="${S*.15}" x2="${S*.36}" y2="${S*.85}" stroke="${c}" stroke-width="${sw}"/>`+
      `<line x1="${S*.64}" y1="${S*.15}" x2="${S*.64}" y2="${S*.85}" stroke="${c}" stroke-width="${sw}"/>`+
      `<line x1="${S*.15}" y1="${S*.36}" x2="${S*.85}" y2="${S*.36}" stroke="${c}" stroke-width="${sw}"/>`+
      `<line x1="${S*.15}" y1="${S*.64}" x2="${S*.85}" y2="${S*.64}" stroke="${c}" stroke-width="${sw}"/>`,
    'zigzag':    (S,sw,c)=>`<polyline points="${S*.1},${S*.5} ${S*.3},${S*.25} ${S*.5},${S*.75} ${S*.7},${S*.25} ${S*.9},${S*.5}" fill="none" stroke="${c}" stroke-width="${sw}" stroke-linejoin="round"/>`,
    'rays':      (S,sw,c)=>{const cx=S/2,cy=S/2,r=S*.36;return Array.from({length:6},(_,i)=>{const a=Math.PI/3*i;return`<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(a)}" y2="${cy+r*Math.sin(a)}" stroke="${c}" stroke-width="${sw}"/>`;}).join('');},
    'grid':      (S,sw,c)=>[.33,.66].map(v=>`<line x1="${S*v}" y1="${S*.15}" x2="${S*v}" y2="${S*.85}" stroke="${c}" stroke-width="${sw}"/>`+`<line x1="${S*.15}" y1="${S*v}" x2="${S*.85}" y2="${S*v}" stroke="${c}" stroke-width="${sw}"/>`).join(''),
    'wave':      (S,sw,c)=>`<path d="M${S*.08} ${S*.5}C${S*.25} ${S*.15},${S*.35} ${S*.85},${S*.5} ${S*.5}S${S*.75} ${S*.15},${S*.92} ${S*.5}" fill="none" stroke="${c}" stroke-width="${sw}"/>`,
    'asterisk':  (S,sw,c)=>{const cx=S/2,cy=S/2,r=S*.22;return`<circle cx="${cx}" cy="${cy}" r="${S*.04}" fill="${c}"/>`+Array.from({length:6},(_,i)=>{const a=Math.PI/3*i-Math.PI/6;return`<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(a)}" y2="${cy+r*Math.sin(a)}" stroke="${c}" stroke-width="${sw}"/>`;}).join('');},
    'tick':      (S,sw,c)=>`<polyline points="${S*.25},${S*.52} ${S*.42},${S*.72} ${S*.75},${S*.3}" fill="none" stroke="${c}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"/>`,
    'arrow-up':  (S,sw,c)=>`<polyline points="${S*.3},${S*.55} ${S*.5},${S*.25} ${S*.7},${S*.55}" fill="none" stroke="${c}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"/><line x1="${S*.5}" y1="${S*.28}" x2="${S*.5}" y2="${S*.78}" stroke="${c}" stroke-width="${sw}" stroke-linecap="round"/>`,
    'arrow-rt':  (S,sw,c)=>`<polyline points="${S*.45},${S*.3} ${S*.75},${S*.5} ${S*.45},${S*.7}" fill="none" stroke="${c}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"/><line x1="${S*.22}" y1="${S*.5}" x2="${S*.72}" y2="${S*.5}" stroke="${c}" stroke-width="${sw}" stroke-linecap="round"/>`,
    'notch-h':   (S,sw,c)=>
      `<line x1="${S*.12}" y1="${S*.38}" x2="${S*.42}" y2="${S*.38}" stroke="${c}" stroke-width="${sw}"/>`+
      `<line x1="${S*.58}" y1="${S*.38}" x2="${S*.88}" y2="${S*.38}" stroke="${c}" stroke-width="${sw}"/>`+
      `<line x1="${S*.12}" y1="${S*.62}" x2="${S*.42}" y2="${S*.62}" stroke="${c}" stroke-width="${sw}"/>`+
      `<line x1="${S*.58}" y1="${S*.62}" x2="${S*.88}" y2="${S*.62}" stroke="${c}" stroke-width="${sw}"/>`,
    'notch-v':   (S,sw,c)=>
      `<line x1="${S*.38}" y1="${S*.12}" x2="${S*.38}" y2="${S*.42}" stroke="${c}" stroke-width="${sw}"/>`+
      `<line x1="${S*.38}" y1="${S*.58}" x2="${S*.38}" y2="${S*.88}" stroke="${c}" stroke-width="${sw}"/>`+
      `<line x1="${S*.62}" y1="${S*.12}" x2="${S*.62}" y2="${S*.42}" stroke="${c}" stroke-width="${sw}"/>`+
      `<line x1="${S*.62}" y1="${S*.58}" x2="${S*.62}" y2="${S*.88}" stroke="${c}" stroke-width="${sw}"/>`,
    'tri-sm':    (S,sw,c)=>{const cx=S/2,cy=S/2,r=S*.12;return`<polygon points="${cx},${cy-r} ${cx+r*.87},${cy+r*.5} ${cx-r*.87},${cy+r*.5}" fill="${c}"/>`;},
    'brackets':  (S,sw,c)=>`<polyline points="${S*.32},${S*.25} ${S*.2},${S*.25} ${S*.2},${S*.75} ${S*.32},${S*.75}" fill="none" stroke="${c}" stroke-width="${sw}"/><polyline points="${S*.68},${S*.25} ${S*.8},${S*.25} ${S*.8},${S*.75} ${S*.68},${S*.75}" fill="none" stroke="${c}" stroke-width="${sw}"/>`,
    'pulse':     (S,sw,c)=>`<polyline points="${S*.08},${S*.5} ${S*.28},${S*.5} ${S*.36},${S*.18} ${S*.44},${S*.82} ${S*.52},${S*.35} ${S*.58},${S*.5} ${S*.92},${S*.5}" fill="none" stroke="${c}" stroke-width="${sw}" stroke-linejoin="round"/>`,
    'starburst': (S,sw,c)=>{const cx=S/2,cy=S/2,r=S*.28;return Array.from({length:8},(_,i)=>{const a=Math.PI/4*i;return`<circle cx="${cx+r*Math.cos(a)}" cy="${cy+r*Math.sin(a)}" r="${S*.03}" fill="${c}"/>`;}).join('');},
    'crosshair': (S,sw,c)=>`<line x1="${S*.12}" y1="${S/2}" x2="${S*.88}" y2="${S/2}" stroke="${c}" stroke-width="${sw}"/><line x1="${S/2}" y1="${S*.12}" x2="${S/2}" y2="${S*.88}" stroke="${c}" stroke-width="${sw}"/><circle cx="${S/2}" cy="${S/2}" r="${S*.08}" fill="none" stroke="${c}" stroke-width="${sw}"/>`,
  },
};

// ═══════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════
function getEffQ(qid, st) {
  const s = st.symmetry;
  if (s==='mirror')  { if(qid==='tr') return st.quadrants.tl; if(qid==='br') return st.quadrants.bl; }
  if (s==='rotate')  { return st.quadrants.tl; }
  if (s==='diagonal'){ if(qid==='br') return st.quadrants.tl; if(qid==='bl') return st.quadrants.tr; }
  return st.quadrants[qid];
}
function getSymTr(qid, sym, S) {
  if (sym==='mirror' && (qid==='tr'||qid==='br')) return `translate(${S},0) scale(-1,1)`;
  if (sym==='rotate') { const a={tl:0,tr:90,br:180,bl:270}[qid]; return a?`rotate(${a},${S/2},${S/2})`:null; }
  return null;
}
function disabledQs(sym) {
  if (sym==='mirror') return ['tr','br'];
  if (sym==='rotate') return ['tr','bl','br'];
  if (sym==='diagonal') return ['bl','br'];
  return [];
}

function renderIcon(st, size, uid) {
  const theme = THEMES[st.theme || params.theme];
  const sz = size||256, gap = st.gap||0, S = (sz-gap)/2;
  const sw = st.strokeWeight||2;
  const bgC = st.invert?'#FFF':'#000', ovC = st.invert?'#000':'#FFF', canv = st.invert?'#000':'#FFF';
  const id = uid || Math.random().toString(36).slice(2,8);
  const pos = {tl:[0,0],tr:[S+gap,0],bl:[0,S+gap],br:[S+gap,S+gap]};
  let d='', c='';
  for (const qid of ['tl','tr','bl','br']) {
    const [px,py]=pos[qid], q=getEffQ(qid,st), tr=getSymTr(qid,st.symmetry,S);
    d+=`<clipPath id="${id}-${qid}"><rect x="${px}" y="${py}" width="${S}" height="${S}"/></clipPath>`;
    c+=`<g clip-path="url(#${id}-${qid})"><g transform="translate(${px},${py})">`;
    if(tr) c+=`<g transform="${tr}">`;
    c+=(theme.bgR[q.bg]||theme.bgR['full'])(S,bgC);
    c+=(theme.ovR[q.overlay]||theme.ovR['none'])(S,sw*(sz/256),ovC);
    if(tr) c+='</g>';
    c+='</g></g>';
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}"><rect width="${sz}" height="${sz}" fill="${canv}"/><defs>${d}</defs>${c}</svg>`;
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
function genFromSeed(seed, themeKey) {
  const theme = THEMES[themeKey || params.theme];
  const bgKeys = theme.bgList.map(b=>b[0]);
  const ovKeys = theme.ovList.map(o=>o[0]);
  const rng = mulberry32(typeof seed==='number'?seed:hashStr(String(seed)));
  const pick = a => a[Math.floor(rng()*a.length)];
  const rq = () => ({bg:pick(bgKeys),overlay:pick(ovKeys)});
  return {tl:rq(),tr:rq(),bl:rq(),br:rq()};
}

let params = { theme:'geometric', symmetry:'none', gap:0, strokeWeight:2, invert:false };
let icons = [];
let selectedIdx = -1;

// ═══════════════════════════════════════════
// UI
// ═══════════════════════════════════════════
const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);

function populateSelects() {
  const theme = THEMES[params.theme];
  $$('.sel-bg').forEach(s => { s.innerHTML = theme.bgList.map(([v,l])=>`<option value="${v}">${l}</option>`).join(''); });
  $$('.sel-ov').forEach(s => { s.innerHTML = theme.ovList.map(([v,l])=>`<option value="${v}">${l}</option>`).join(''); });
}

function buildThemeButtons() {
  const row = $('#theme-row');
  row.innerHTML = '';
  for (const key of Object.keys(THEMES)) {
    const btn = document.createElement('button');
    btn.className = 'theme-btn' + (key===params.theme?' active':'');
    btn.textContent = THEMES[key].name;
    btn.dataset.theme = key;
    btn.addEventListener('click', () => {
      params.theme = key;
      $$('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===key));
      populateSelects();
      regenerateAll();
    });
    row.appendChild(btn);
  }
}

function generate(baseSeed) {
  const base = typeof baseSeed==='number'?baseSeed:hashStr(String(baseSeed));
  icons = [];
  for (let i=0; i<50; i++) {
    const seed = base + i * 7919;
    icons.push({ seed, quadrants: genFromSeed(seed) });
  }
  selectedIdx = -1;
  renderGrid();
  updateEditPanel();
}

function regenerateAll() {
  const v = $('#seed-input').value.trim();
  const seed = /^\d+$/.test(v)?parseInt(v):v;
  generate(seed);
}

function renderGrid() {
  const grid = $('#grid');
  grid.innerHTML = '';
  icons.forEach((icon, i) => {
    const st = { ...params, ...icon };
    const div = document.createElement('div');
    div.className = 'grid-item' + (i===selectedIdx?' selected':'');
    div.innerHTML = renderIcon(st, 128, 'g'+i) + `<span class="seed-tag">${icon.seed}</span>`;
    div.addEventListener('click', () => selectIcon(i));
    grid.appendChild(div);
  });
  $('#count').textContent = icons.length + ' icons';
}

function selectIcon(i) {
  selectedIdx = i;
  document.querySelectorAll('.grid-item').forEach((el,j) => el.classList.toggle('selected', j===i));
  updateEditPanel();
  updatePreview();
}

function updatePreview() {
  const pv = $('#preview');
  if (selectedIdx<0) { pv.className='tb-preview empty'; pv.innerHTML='Select an icon'; return; }
  pv.className = 'tb-preview';
  pv.innerHTML = renderIcon({ ...params, ...icons[selectedIdx] }, 256, 'pv');
}

function updateEditPanel() {
  const sec = $('#edit-section');
  if (selectedIdx<0) { sec.style.display='none'; return; }
  sec.style.display = '';
  const q = icons[selectedIdx].quadrants;
  const disabled = disabledQs(params.symmetry);
  for (const qid of ['tl','tr','bl','br']) {
    const cell = $(`.q-cell[data-q="${qid}"]`);
    const isDis = disabled.includes(qid);
    cell.classList.toggle('disabled', isDis);
    const eff = isDis ? getEffQ(qid, { ...params, quadrants: q }) : q[qid];
    const bgSel = $(`.sel-bg[data-q="${qid}"]`);
    const ovSel = $(`.sel-ov[data-q="${qid}"]`);
    // Only set value if option exists in current theme
    if ([...bgSel.options].some(o=>o.value===eff.bg)) bgSel.value = eff.bg;
    if ([...ovSel.options].some(o=>o.value===eff.overlay)) ovSel.value = eff.overlay;
  }
}

function reRenderSelected() {
  if (selectedIdx<0) return;
  const el = document.querySelectorAll('.grid-item')[selectedIdx];
  if (!el) return;
  const st = { ...params, ...icons[selectedIdx] };
  el.innerHTML = renderIcon(st, 128, 'g'+selectedIdx) + `<span class="seed-tag">${icons[selectedIdx].seed}</span>`;
  updatePreview();
}

function reRenderAll() { renderGrid(); updatePreview(); }

// ═══════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════
function setup() {
  $('#btn-generate').addEventListener('click', () => {
    const v=$('#seed-input').value.trim(); generate(/^\d+$/.test(v)?parseInt(v):v);
  });
  $('#seed-input').addEventListener('keydown', e => { if(e.key==='Enter') $('#btn-generate').click(); });
  $('#btn-random').addEventListener('click', () => {
    const s=Math.floor(Math.random()*99999); $('#seed-input').value=s; generate(s);
  });
  $$('.sym-btn').forEach(btn => btn.addEventListener('click', () => {
    params.symmetry=btn.dataset.sym;
    $$('.sym-btn').forEach(b=>b.classList.toggle('active',b.dataset.sym===params.symmetry));
    reRenderAll(); updateEditPanel();
  }));
  $('#gap-slider').addEventListener('input', e => {
    params.gap=parseInt(e.target.value); $('#gap-val').textContent=params.gap; reRenderAll();
  });
  $('#stroke-slider').addEventListener('input', e => {
    params.strokeWeight=parseFloat(e.target.value); $('#stroke-val').textContent=params.strokeWeight; reRenderAll();
  });
  $('#invert-toggle').addEventListener('click', () => {
    params.invert=!params.invert; $('#invert-toggle').classList.toggle('on',params.invert); reRenderAll();
  });
  $$('.sel-bg').forEach(sel => sel.addEventListener('change', e => {
    if(selectedIdx<0) return;
    icons[selectedIdx].quadrants[e.target.dataset.q].bg=e.target.value;
    reRenderSelected(); updateEditPanel();
  }));
  $$('.sel-ov').forEach(sel => sel.addEventListener('change', e => {
    if(selectedIdx<0) return;
    icons[selectedIdx].quadrants[e.target.dataset.q].overlay=e.target.value;
    reRenderSelected(); updateEditPanel();
  }));
  $('#btn-svg').addEventListener('click', () => {
    if(selectedIdx<0) return;
    const st={...params,...icons[selectedIdx]};
    const svg=renderIcon(st,512,'ex');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'}));
    a.download=`wave-bit-${st.seed}.svg`; a.click();
  });
  $('#btn-png').addEventListener('click', () => {
    if(selectedIdx<0) return;
    const st={...params,...icons[selectedIdx]};
    const svg=renderIcon(st,1024,'ex');
    const url=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'}));
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas'); c.width=c.height=1024;
      c.getContext('2d').drawImage(img,0,0); URL.revokeObjectURL(url);
      c.toBlob(b=>{const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=`wave-bit-${st.seed}.png`; a.click();});
    };
    img.src=url;
  });
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
buildThemeButtons();
populateSelects();
setup();
generate(42);
</script>
</body>
</html>
