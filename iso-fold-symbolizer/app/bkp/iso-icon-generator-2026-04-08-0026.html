<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iso Icon Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f0;color:#1a1a1a;padding:16px}
.wrap{max-width:1100px;margin:0 auto;display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start}
.left{flex:1;min-width:380px}
.right{flex:0 0 260px}
.gen{padding:10px 20px;font-size:15px;font-weight:600;border:1px solid #ccc;background:#fff;border-radius:10px;cursor:pointer;width:100%;margin-bottom:12px}
.gen:hover{background:#eee}
.gen:active{transform:scale(0.98)}
.grid{display:grid;gap:8px;margin-bottom:12px}
.grid-item{border-radius:12px;border:2px solid transparent;padding:8px;display:flex;align-items:center;justify-content:center;aspect-ratio:1;cursor:pointer;position:relative;transition:border-color .15s}
.grid-item:hover{border-color:#999}
.grid-item.selected{border-color:#1a1a1a}
.grid-item .seed{position:absolute;bottom:4px;right:6px;font-size:9px;color:#aaa;font-family:monospace;opacity:0;transition:opacity .15s}
.grid-item:hover .seed{opacity:1}
.s{margin-bottom:11px}
.s label{font-size:13px;color:#888;display:block;margin-bottom:3px}
.s .r{display:flex;justify-content:space-between;align-items:center}
.s .r span{font-size:13px;font-weight:600;min-width:36px;text-align:right}
input[type=range]{width:100%;height:4px;-webkit-appearance:none;background:#ddd;border-radius:2px;outline:none;margin-top:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#1a1a1a;cursor:pointer}
.bb{display:flex;gap:5px;flex-wrap:wrap}
.bb button{font-size:12px;padding:4px 11px;border:1px solid #ccc;background:#fff;border-radius:6px;cursor:pointer;color:#1a1a1a;transition:all .1s}
.bb button:hover{background:#eee}
.bb button.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.sep{border:none;border-top:1px solid #e8e8e4;margin:12px 0}
.seed-display{font-family:monospace;font-size:12px;color:#aaa;margin-top:4px}
.top{display:flex;gap:6px;flex-wrap:wrap}
.top button{padding:5px 10px;font-size:12px;font-weight:500;border:1px solid #ccc;background:#fff;border-radius:7px;cursor:pointer}
.top button:hover{background:#eee}
.color-row{display:flex;gap:6px;flex-wrap:wrap}
.color-swatch{width:28px;height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:border-color .1s}
.color-swatch:hover,.color-swatch.on{border-color:#1a1a1a}
</style>
</head>
<body>
<div class="wrap">
<div class="left">
<button class="gen" onclick="generateBatch()">Generate</button>
<div class="grid" id="grid"></div>
<div class="seed-display" id="seedInfo"></div>
</div>
<div class="right">

<div class="s"><label>Symmetry</label>
<div class="bb" id="symb"></div></div>

<div class="s"><div class="r"><label>Arm size</label><span id="asv">4</span></div>
<input type="range" min="1" max="8" step="1" value="4" id="as" oninput="P.as=+this.value;updPieces()"></div>

<div class="s"><div class="r"><label>Scatter</label><span id="scv">0</span></div>
<input type="range" min="0" max="8" step="1" value="0" id="sc" oninput="P.sc=+this.value;updPieces()"></div>

<div class="s"><div class="r"><label>Total pieces</label><span id="tpv">4</span></div></div>

<div class="s"><div class="r"><label>Count</label><span id="cnv">12</span></div>
<input type="range" min="4" max="24" step="1" value="12" id="cn" oninput="P.cn=+this.value;$('cnv').textContent=P.cn"></div>

<hr class="sep">

<div class="s"><div class="r"><label>Fill</label><span id="fv">0.88</span></div>
<input type="range" min="0.4" max="0.98" step="0.01" value="0.88" id="fi" oninput="P.fi=+this.value;rerender()"></div>

<div class="s"><div class="r"><label>Taper</label><span id="tv">0.25</span></div>
<input type="range" min="0" max="1.0" step="0.01" value="0.25" id="ta" oninput="P.ta=+this.value;rerender()"></div>

<div class="s"><div class="r"><label>Gap</label><span id="gv">3.0</span></div>
<input type="range" min="0" max="8" step="0.5" value="3" id="ga" oninput="P.ga=+this.value;rerender()"></div>

<div class="s"><div class="r"><label>Rounding</label><span id="rv">0</span></div>
<input type="range" min="0" max="5" step="0.5" value="0" id="rn" oninput="P.rn=+this.value;rerender()"></div>

<hr class="sep">

<div class="s"><label>Background</label>
<div class="color-row" id="bgrow"></div></div>

<hr class="sep">

<div class="top">
<button id="cp" onclick="copySVG()">Copy SVG</button>
<button onclick="copySeed()">Copy seed</button>
</div>

</div>
</div>

<script>
var P={sym:0,as:4,cn:12,fi:0.88,ta:0.25,ga:3,rn:0,bg:'#ffffff',sc:0};
function totalPieces(){return P.as+P.sc}
var allIcons=[];
var selectedIdx=0;

function $(id){return document.getElementById(id)}

// --- Seeded PRNG (mulberry32) ---
function prng(seed){
  return function(){
    seed|=0;seed=seed+0x6D2B79F5|0;
    var t=Math.imul(seed^seed>>>15,1|seed);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return((t^t>>>14)>>>0)/4294967296;
  };
}

// --- Iso grid math ---
var S=34;
var H=S*0.866;
var DIRS=[
  {dq:1,dr:0},{dq:0,dr:1},{dq:-1,dr:1},
  {dq:-1,dr:0},{dq:0,dr:-1},{dq:1,dr:-1}
];

function nKey(q,r){return q+','+r}
function eKey(q1,r1,q2,r2){
  var a=nKey(q1,r1),b=nKey(q2,r2);
  return a<b?a+'|'+b:b+'|'+a;
}
function parseEKey(k){
  var p=k.split('|'),a=p[0].split(',').map(Number),b=p[1].split(',').map(Number);
  return{q1:a[0],r1:a[1],q2:b[0],r2:b[1]};
}

function rotNode(q,r,times){
  for(var t=0;t<times;t++){var nq=-r,nr=q+r;q=nq;r=nr}
  return{q:q,r:r};
}
function mirNode(q,r){return{q:-q-r,r:r}}

// --- Polarity ---
function calcPol(edgeSet){
  var pol={};
  var ak=Object.keys(edgeSet);if(!ak.length)return pol;
  var adj={};
  ak.forEach(function(k){
    var e=parseEKey(k);
    var k1=nKey(e.q1,e.r1),k2=nKey(e.q2,e.r2);
    if(!adj[k1])adj[k1]=[];if(!adj[k2])adj[k2]=[];
    adj[k1].push(k2);adj[k2].push(k1);
  });
  var vis={},all=Object.keys(adj);
  for(var i=0;i<all.length;i++){
    if(vis[all[i]])continue;
    pol[all[i]]=0;vis[all[i]]=true;
    var q=[all[i]];
    while(q.length){
      var cur=q.shift(),cp=pol[cur];
      (adj[cur]||[]).forEach(function(nb){
        if(!vis[nb]){pol[nb]=cp===0?1:0;vis[nb]=true;q.push(nb)}
      });
    }
  }
  return pol;
}

// --- Generate one icon from seed ---
function generateIcon(seed){
  var rand=prng(seed);
  var edgeSet={};
  
  // Actually simplest correct approach for all hexagonal:
  // Symmetry modes — all produce hexagonal (6 copies total):
  // 0: 6-fold — arm × 6 rotation
  // 1: 3 mirror — arm mirrored, pair × 3 rotation (bilateral within each 120°)
  // 2: 3 flip — arm × 3 at even rotations, mirrored arm × 3 at odd rotations (pinwheel)
  // 3: dihedral — arm in 30° wedge, mirrored to 60°, × 6 rotation
  var wedgeAngle;
  if(P.sym===0)wedgeAngle=60;
  else if(P.sym===1)wedgeAngle=60;
  else if(P.sym===2)wedgeAngle=60;
  else wedgeAngle=30;

  // Get all possible edges for arm growth
  var possibleEdges=[];
  for(var q=-5;q<=5;q++)
    for(var r=-5;r<=5;r++)
      for(var d=0;d<6;d++){
        var nq=q+DIRS[d].dq,nr=r+DIRS[d].dr;
        if(Math.abs(nq)<=5&&Math.abs(nr)<=5&&Math.abs(nq+nr)<=5){
          var p1x=S*(q+r*0.5),p1y=S*r*0.866;
          var p2x=S*(nq+nr*0.5),p2y=S*nr*0.866;
          var mx=(p1x+p2x)/2,my=(p1y+p2y)/2;
          var ang=Math.atan2(my,mx)*180/Math.PI;
          if(ang<-2)ang+=360;
          if(ang>=-2&&ang<wedgeAngle+2){
            possibleEdges.push({q1:q,r1:r,q2:nq,r2:nr,mx:mx,my:my,dist:Math.sqrt(mx*mx+my*my)});
          }
        }
      }

  // Remove duplicate edges
  var seen={};
  possibleEdges=possibleEdges.filter(function(e){
    var k=eKey(e.q1,e.r1,e.q2,e.r2);
    if(seen[k])return false;seen[k]=true;return true;
  });

  // Grow arm — split between tree growth and scattered (random) placement
  var armSet={};
  var armKeys=[];

  possibleEdges.sort(function(a,b){return a.dist-b.dist});
  if(!possibleEdges.length)return{edges:edgeSet,pol:{},seed:seed};

  var treeCount=P.as;
  var scatterCount=P.sc;

  // Tree growth: connected random walk from seed
  if(treeCount>0){
    var seedEdge=possibleEdges[Math.min(Math.floor(rand()*2),possibleEdges.length-1)];
    var sk=eKey(seedEdge.q1,seedEdge.r1,seedEdge.q2,seedEdge.r2);
    armSet[sk]=1;armKeys.push(sk);

    for(var step=0;step<treeCount-1;step++){
      var cands=[];
      armKeys.forEach(function(k){
        var e=parseEKey(k);
        [[e.q1,e.r1],[e.q2,e.r2]].forEach(function(node){
          DIRS.forEach(function(d){
            var nq=node[0]+d.dq,nr=node[1]+d.dr;
            if(Math.abs(nq)>5||Math.abs(nr)>5||Math.abs(nq+nr)>5)return;
            var nek=eKey(node[0],node[1],nq,nr);
            if(armSet[nek])return;
            var p1x=S*(node[0]+node[1]*0.5),p1y=S*node[1]*0.866;
            var p2x=S*(nq+nr*0.5),p2y=S*nr*0.866;
            var mx=(p1x+p2x)/2,my=(p1y+p2y)/2;
            var ang=Math.atan2(my,mx)*180/Math.PI;
            if(ang<-2)ang+=360;
            if(ang>=-2&&ang<wedgeAngle+2)
              cands.push({ek:nek,dist:Math.sqrt(mx*mx+my*my)});
          });
        });
      });
      if(!cands.length)break;
      cands.sort(function(){return rand()-0.5});
      var pick=cands[Math.floor(rand()*Math.min(3,cands.length))];
      armSet[pick.ek]=1;armKeys.push(pick.ek);
    }
  }

  // Scattered pieces: randomly placed edges anywhere in the wedge
  if(scatterCount>0){
    var available=possibleEdges.filter(function(e){
      return !armSet[eKey(e.q1,e.r1,e.q2,e.r2)];
    });
    for(var s=0;s<scatterCount&&available.length;s++){
      var idx=Math.floor(rand()*available.length);
      var re=available[idx];
      var rk=eKey(re.q1,re.r1,re.q2,re.r2);
      armSet[rk]=1;armKeys.push(rk);
      available.splice(idx,1);
    }
  }

  // Stamp with symmetry
  armKeys.forEach(function(k){
    var e=parseEKey(k);
    if(P.sym===0){
      // 6-fold: stamp 6×
      for(var f=0;f<6;f++){
        var a1=rotNode(e.q1,e.r1,f),a2=rotNode(e.q2,e.r2,f);
        edgeSet[eKey(a1.q,a1.r,a2.q,a2.r)]=1;
      }
    } else if(P.sym===1){
      // 3 mirror: arm + mirror, × 3
      for(var f=0;f<3;f++){
        var a1=rotNode(e.q1,e.r1,f*2),a2=rotNode(e.q2,e.r2,f*2);
        edgeSet[eKey(a1.q,a1.r,a2.q,a2.r)]=1;
        var m1=mirNode(a1.q,a1.r),m2=mirNode(a2.q,a2.r);
        edgeSet[eKey(m1.q,m1.r,m2.q,m2.r)]=1;
      }
    } else if(P.sym===2){
      // 3 flip: arm at 0°,120°,240° + mirrored arm at 60°,180°,300° (pinwheel)
      for(var f=0;f<3;f++){
        var a1=rotNode(e.q1,e.r1,f*2),a2=rotNode(e.q2,e.r2,f*2);
        edgeSet[eKey(a1.q,a1.r,a2.q,a2.r)]=1;
        // Mirror then rotate by 1 step (60° offset)
        var m1=mirNode(e.q1,e.r1),m2=mirNode(e.q2,e.r2);
        var r1=rotNode(m1.q,m1.r,f*2+1),r2=rotNode(m2.q,m2.r,f*2+1);
        edgeSet[eKey(r1.q,r1.r,r2.q,r2.r)]=1;
      }
    } else {
      // dihedral: mirror + 6×
      for(var f=0;f<6;f++){
        var a1=rotNode(e.q1,e.r1,f),a2=rotNode(e.q2,e.r2,f);
        edgeSet[eKey(a1.q,a1.r,a2.q,a2.r)]=1;
        var m1=mirNode(a1.q,a1.r),m2=mirNode(a2.q,a2.r);
        edgeSet[eKey(m1.q,m1.r,m2.q,m2.r)]=1;
      }
    }
  });

  var pol=calcPol(edgeSet);
  return{edges:edgeSet,pol:pol,seed:seed};
}

// --- Grid overlay ---
function gridSVG(){
  var lines='',seen={};
  var R=5;
  for(var q=-R;q<=R;q++)
    for(var r=-R;r<=R;r++){
      if(Math.abs(q+r)>R)continue;
      var x1=S*(q+r*0.5),y1=S*r*0.866;
      for(var d=0;d<3;d++){
        var nq=q+DIRS[d].dq,nr=r+DIRS[d].dr;
        if(Math.abs(nq)>R||Math.abs(nr)>R||Math.abs(nq+nr)>R)continue;
        var k=eKey(q,r,nq,nr);
        if(seen[k])continue;seen[k]=1;
        var x2=S*(nq+nr*0.5),y2=S*nr*0.866;
        lines+='<line x1="'+x1.toFixed(1)+'" y1="'+y1.toFixed(1)+'" x2="'+x2.toFixed(1)+'" y2="'+y2.toFixed(1)+'"/>';
      }
    }
  // Hex outline
  var hex='';
  var corners=[[R,0],[0,R],[-R,R],[-R,0],[0,-R],[R,-R]];
  for(var i=0;i<6;i++){
    var c=corners[i];
    var px=S*(c[0]+c[1]*0.5),py=S*c[1]*0.866;
    hex+=(i?'L':'M')+px.toFixed(1)+','+py.toFixed(1);
  }
  return '<g stroke="#ddd" stroke-width="0.5" fill="none">'+lines+'</g>'
    +'<path d="'+hex+'Z" stroke="#ccc" stroke-width="1" fill="none"/>';
}

// --- Render icon to SVG ---
function iconToSVG(icon,sz,bgColor,showGrid){
  var ak=Object.keys(icon.edges);
  var vx,vy,fullDim;

  if(showGrid){
    // Fixed viewBox based on full hex grid
    var R=5;
    var gridW=S*(R+R*0.5);
    var gridH=S*R*0.866;
    var pad=8;
    fullDim=Math.max((gridW+pad)*2,(gridH+pad)*2);
    vx=-fullDim/2;vy=-fullDim/2;
  } else {
    // Tight viewBox around pieces
    var mnX=1e9,mxX=-1e9,mnY=1e9,mxY=-1e9;
    ak.forEach(function(k){
      var e=parseEKey(k);
      var pts=plankPts(e.q1,e.r1,e.q2,e.r2,icon.pol);
      pts.forEach(function(p){if(p[0]<mnX)mnX=p[0];if(p[0]>mxX)mxX=p[0];if(p[1]<mnY)mnY=p[1];if(p[1]>mxY)mxY=p[1]});
    });
    if(!ak.length){mnX=0;mxX=sz;mnY=0;mxY=sz}
    var pad=8;mnX-=pad;mnY-=pad;mxX+=pad;mxY+=pad;
    fullDim=Math.max(mxX-mnX,mxY-mnY);
    var cx=(mnX+mxX)/2,cy=(mnY+mxY)/2;
    vx=cx-fullDim/2;vy=cy-fullDim/2;
  }

  var svg='<svg viewBox="'+vx.toFixed(1)+' '+vy.toFixed(1)+' '+fullDim.toFixed(1)+' '+fullDim.toFixed(1)+'" xmlns="http://www.w3.org/2000/svg" width="'+sz+'" height="'+sz+'">';
  if(bgColor&&bgColor!=='transparent')
    svg+='<rect x="'+vx.toFixed(1)+'" y="'+vy.toFixed(1)+'" width="'+fullDim.toFixed(1)+'" height="'+fullDim.toFixed(1)+'" fill="'+bgColor+'"/>';

  if(showGrid) svg+=gridSVG();

  var polys=[];
  ak.forEach(function(k){
    var e=parseEKey(k);
    polys.push(plankPts(e.q1,e.r1,e.q2,e.r2,icon.pol));
  });

  polys.forEach(function(pts){
    if(P.rn>0){
      var n=pts.length,d='';
      for(var i=0;i<n;i++){
        var prev=pts[(i-1+n)%n],cur=pts[i],next=pts[(i+1)%n];
        var d1x=prev[0]-cur[0],d1y=prev[1]-cur[1],d2x=next[0]-cur[0],d2y=next[1]-cur[1];
        var l1=Math.sqrt(d1x*d1x+d1y*d1y),l2=Math.sqrt(d2x*d2x+d2y*d2y);
        var rr=Math.min(P.rn,l1/2,l2/2);
        if(i===0)d='M'+(cur[0]+d1x/l1*rr).toFixed(1)+','+(cur[1]+d1y/l1*rr).toFixed(1);
        else d+='L'+(cur[0]+d1x/l1*rr).toFixed(1)+','+(cur[1]+d1y/l1*rr).toFixed(1);
        d+='Q'+cur[0].toFixed(1)+','+cur[1].toFixed(1)+' '+(cur[0]+d2x/l2*rr).toFixed(1)+','+(cur[1]+d2y/l2*rr).toFixed(1);
      }
      svg+='<path d="'+d+'Z" fill="#1a1a1a"/>';
    } else {
      svg+='<polygon points="'+pts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1)}).join(' ')+'" fill="#1a1a1a"/>';
    }
  });
  return svg+'</svg>';
}

function plankPts(q1,r1,q2,r2,pol){
  var p1x=S*(q1+r1*0.5),p1y=S*r1*0.866;
  var p2x=S*(q2+r2*0.5),p2y=S*r2*0.866;
  var dx=p2x-p1x,dy=p2y-p1y;
  var len=Math.sqrt(dx*dx+dy*dy);
  var ux=dx/len,uy=dy/len,nx=-uy,ny=ux;

  var halfW=H*P.fi;
  var narrowW=halfW*(1-P.ta);
  var halfL=len/2-P.ga;
  if(halfL<2)halfL=2;

  var w1=(pol[nKey(q1,r1)]===1)?narrowW:halfW;
  var w2=(pol[nKey(q2,r2)]===1)?narrowW:halfW;

  var mx=(p1x+p2x)/2,my=(p1y+p2y)/2;
  return[
    [mx-ux*halfL+nx*w1,my-uy*halfL+ny*w1],
    [mx+ux*halfL+nx*w2,my+uy*halfL+ny*w2],
    [mx+ux*halfL-nx*w2,my+uy*halfL-ny*w2],
    [mx-ux*halfL-nx*w1,my-uy*halfL-ny*w1]
  ];
}

// --- Batch generation ---
function generateBatch(){
  allIcons=[];
  for(var i=0;i<P.cn;i++){
    var seed=Math.floor(Math.random()*2147483647);
    allIcons.push(generateIcon(seed));
  }
  selectedIdx=0;
  renderGrid();
}

function renderGrid(){
  var g=$('grid');
  var cols=Math.ceil(Math.sqrt(P.cn));
  g.style.gridTemplateColumns='repeat('+cols+',1fr)';
  g.innerHTML='';
  allIcons.forEach(function(icon,idx){
    var d=document.createElement('div');
    d.className='grid-item'+(idx===selectedIdx?' selected':'');
    d.style.background=P.bg;
    d.innerHTML=iconToSVG(icon,120,'transparent',true)+'<span class="seed">#'+icon.seed+'</span>';
    d.onclick=function(){
      selectedIdx=idx;
      renderGrid();
      $('seedInfo').textContent='Seed: '+icon.seed;
    };
    g.appendChild(d);
  });
  updateReadouts();
}

function rerender(){
  // Recompute polarity for all icons (taper may have changed)
  allIcons.forEach(function(icon){icon.pol=calcPol(icon.edges)});
  renderGrid();
}

function updPieces(){
  $('asv').textContent=P.as;
  $('scv').textContent=P.sc;
  $('tpv').textContent=totalPieces();
}

function updateReadouts(){
  $('fv').textContent=P.fi.toFixed(2);
  $('tv').textContent=P.ta.toFixed(2);
  $('gv').textContent=P.ga.toFixed(1);
  $('rv').textContent=P.rn;
  updPieces();
  updBtns();
}

function updBtns(){
  $('symb').querySelectorAll('button').forEach(function(b,i){b.className=P.sym===i?'on':''});
  $('bgrow').querySelectorAll('.color-swatch').forEach(function(s){s.className='color-swatch'+(s.dataset.c===P.bg?' on':'')});
}

// --- Symmetry buttons ---
(function(){
  ['6-fold','3 mirror','3 flip','dihedral'].forEach(function(l,i){
    var b=document.createElement('button');b.textContent=l;
    b.onclick=function(){P.sym=i;updBtns()};
    $('symb').appendChild(b);
  });
})();

// --- BG colors ---
(function(){
  ['#ffffff','#F26522','#1a1a1a','#2D5A27','#1B3A6B','#6B1B3A','#f5f0e0'].forEach(function(c){
    var d=document.createElement('div');
    d.className='color-swatch';
    d.style.background=c;
    if(c==='#ffffff')d.style.border='2px solid #ddd';
    d.dataset.c=c;
    d.onclick=function(){P.bg=c;renderGrid()};
    $('bgrow').appendChild(d);
  });
})();

function copySVG(){
  if(!allIcons.length)return;
  var icon=allIcons[selectedIdx];
  var svg=iconToSVG(icon,512,P.bg==='#ffffff'?'transparent':P.bg);
  navigator.clipboard.writeText(svg).then(function(){
    $('cp').textContent='Copied!';setTimeout(function(){$('cp').textContent='Copy SVG'},1500);
  });
}

function copySeed(){
  if(!allIcons.length)return;
  var icon=allIcons[selectedIdx];
  var info='Seed: '+icon.seed+' | Sym: '+['6-fold','3-mirror','3-flip','dihedral'][P.sym]+' | Arm: '+P.as+' | Scatter: '+P.sc+' | Total: '+totalPieces()+' | Fill: '+P.fi+' | Taper: '+P.ta+' | Gap: '+P.ga;
  navigator.clipboard.writeText(info).then(function(){
    $('seedInfo').textContent='Copied: '+info;
  });
}

generateBatch();
</script>
</body>
</html>
